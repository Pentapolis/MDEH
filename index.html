<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDEH – Coming Soon</title>
    <meta name="description" content="MDEH – Almarj Diabetic and Endocrine Specialist Hospital, Coming Soon Landing Page">
    <meta name="theme-color" content="#0a5e7d">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="MDEH – Coming Soon">
    <meta property="og:description" content="Almarj Diabetic and Endocrine Specialist Hospital – Coming Soon">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating particles background -->
    <div class="particles" id="particles" aria-hidden="true"></div>

    <main class="container">
        <!-- Header Section -->
        <header class="header" id="header">
            <div class="logo-wrapper fade-in" id="logoWrapper">
                <img src="logo.png" alt="MDEH Hospital Logo" class="logo" id="logo" width="180" height="180">
                <div class="logo-glow" aria-hidden="true"></div>
            </div>

            <div class="hospital-name fade-in" id="hospitalName" style="animation-delay: 0.3s;">
                <h1 class="name-ar">مستشفى المرج التخصصي لعلاج مرضى السكري والغدد الصماء</h1>
                <p class="name-en">ALMARJ DIABETIC AND ENDOCRINE SPECIALIST HOSPITAL (MDEH)</p>
            </div>
        </header>

        <!-- Divider -->
        <div class="divider fade-in" style="animation-delay: 0.5s;" aria-hidden="true">
            <span class="divider-line"></span>
            <span class="divider-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="currentColor"/>
                </svg>
            </span>
            <span class="divider-line"></span>
        </div>

        <!-- Coming Soon Section -->
        <section class="coming-soon fade-in" id="comingSoon" style="animation-delay: 0.7s;" aria-label="Coming Soon">
            <h2 class="coming-soon-ar" id="comingSoonAr">انتظرونا قريباً</h2>
            <p class="coming-soon-en" id="comingSoonEn">Coming Soon...</p>
            <div class="pulse-ring" aria-hidden="true"></div>
        </section>

        <!-- Contact Section -->
        <section class="contact fade-in" id="contact" style="animation-delay: 1s;" aria-label="Contact Information">
            <div class="email-wrapper">
                <svg class="email-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M22 7L13.03 12.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
                <a href="mailto:info@mdeh.org.ly" class="email-link" id="emailLink">info@mdeh.org.ly</a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer fade-in" id="footer" style="animation-delay: 1.2s;">
        <p class="copyright">&copy; CopyRights 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
